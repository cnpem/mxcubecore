%YAML 1.2

---


repos:


  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(hkli|nml|XDS)$
      - id: end-of-file-fixer
        exclude: \.(hkli|nml)$
      - id: check-case-conflict
      - id: check-merge-conflict
        # Exclude files where underlines are not distinguishable from merge conflicts.
        exclude: /README\.rst$|^docs/.*\.rst$
      - id: check-symlinks
      - id: check-xml
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]


  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - --strict


  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10  # Keep in sync with `poetry.lock` and `pyproject.toml`
    hooks:
      # For the `ruff` hook (which runs `ruff check`),
      # we purposefully skip the `--fix` option,
      # and recommend running something like `poetry run ruff --fix` locally instead.
      - id: ruff
      - id: ruff-format


  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-ruff
          - mdformat-tables


  - repo: https://github.com/python-poetry/poetry
    rev: 2.1.3
    hooks:
      - id: poetry-check


...
