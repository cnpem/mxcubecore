target-version = "py310"  # Should be the lowest Python version that we support
force-exclude = true
extend-exclude = [
    ".gitignore",
]


[format]
docstring-code-format = true


[lint]
ignore = [
    "B028", # Allow to use the Python standard for warnings (oneline) instead of giving explicit stacklevel
]
select = [
    "E", "F", "B", "I", "S"
]


[lint.pep8-naming]
extend-ignore-names = [
    "HWR",  # `HWR` is often used as a shorthand for `mxcubecore.HardwareRepository`.
]


[lint.pydocstyle]
convention = "google"


[lint.per-file-ignores]
"test/test_*.py" = [
    "S101",  # Allow uses of the `assert` keyword
]
